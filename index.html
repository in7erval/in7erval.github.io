<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>тут ничего нет</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: #000;
        color: #fff;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family:
          ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: clamp(1.1rem, 4.5vw, 1.9rem);
        letter-spacing: 0.02em;
      }
      .line {
        display: inline-flex;
        align-items: center;
      }
      #txt {
        white-space: pre;
      }
      .caret {
        display: inline-block;
        width: 0.55ch;
        height: 1.15em;
        margin-left: 0.14em;
        background: #fff;
        animation: blink 1s steps(1) infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .caret {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="line">
      <span id="txt"></span><span class="caret" aria-hidden="true"></span>
    </div>
    <script>
      const text = "тут ничего нет";
      const el = document.getElementById("txt");
      if (matchMedia("(prefers-reduced-motion: reduce)").matches) {
        el.textContent = text;
      } else {
        let i = 0;
        (function type() {
          el.textContent = text.slice(0, i);
          if (i++ <= text.length) setTimeout(type, 95);
        })();
      }
    </script>
  </body>
</html>
