<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>привет миру</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: #0a0a0a;
        color: var(--fg);
        --fg: #f8f7f4;
        min-height: 100dvh;
        overflow: hidden;
        font-family:
          ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono",
          "Courier New", monospace;
      }

      /* field of faint random letters revealed by the "flashlight" */
      #field {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      /* soft flashlight halo following the cursor */
      #beam {
        position: fixed;
        z-index: 2;
        width: 410px;
        height: 410px;
        left: 0;
        top: 0;
        margin: -205px 0 0 -205px;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(255, 255, 255, 0.02) 35%,
          transparent 70%
        );
      }

      /* the actual message, always readable, on top */
      .line {
        position: fixed;
        inset: 0;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .type {
        font-size: clamp(1.1rem, 4.5vw, 1.9rem);
        line-height: 1;
        letter-spacing: 0.02em;
        white-space: pre;
        color: var(--fg);
        text-shadow: 0 0 8px currentColor;
      }
      .caret {
        display: inline-block;
        width: 0.5ch;
        height: 1em;
        margin-left: 0.12em;
        vertical-align: -0.12em;
        background: var(--fg);
        animation: blink 1s steps(1) infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      /* --- CRT overlay: scanlines + vignette + flicker --- */
      .crt {
        position: fixed;
        inset: 0;
        z-index: 6;
        pointer-events: none;
        animation: crtflicker 4.5s steps(30) infinite;
      }
      .crt::before {
        /* scanlines */
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0 2px,
          rgba(0, 0, 0, 0.22) 2px 4px
        );
        mix-blend-mode: multiply;
      }
      .crt::after {
        /* vignette + slow rolling scan band */
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)) top /
            100% 40% no-repeat,
          radial-gradient(
            ellipse at center,
            rgba(0, 0, 0, 0) 52%,
            rgba(0, 0, 0, 0.55) 100%
          );
        background-position:
          0 -40%,
          0 0;
        animation: crtroll 7s linear infinite;
      }
      @keyframes crtflicker {
        0%,
        100% {
          opacity: 1;
        }
        48% {
          opacity: 1;
        }
        50% {
          opacity: 0.94;
        }
        52% {
          opacity: 1;
        }
        70% {
          opacity: 0.97;
        }
        72% {
          opacity: 1;
        }
      }
      @keyframes crtroll {
        0% {
          background-position:
            0 -40%,
            0 0;
        }
        100% {
          background-position:
            0 140%,
            0 0;
        }
      }
      /* --- glitch bursts: RGB-split + horizontal judder --- */
      #glitch {
        position: fixed;
        inset: 0;
        z-index: 7;
        pointer-events: none;
        opacity: 0;
        mix-blend-mode: screen;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0 6px,
          rgba(255, 0, 64, 0.07) 6px 8px,
          transparent 8px 14px,
          rgba(0, 255, 255, 0.07) 14px 16px
        );
      }
      body.glitching #glitch {
        animation: glitchBands 0.2s steps(3) both;
      }
      body.glitching #field {
        animation: glitchShift 0.2s steps(2) both;
      }
      body.glitching .type {
        animation: glitchSplit 0.2s steps(1) both;
      }
      @keyframes glitchBands {
        0% {
          opacity: 0;
          transform: translateY(0);
        }
        30% {
          opacity: 1;
          transform: translateY(-7px);
        }
        60% {
          opacity: 0.7;
          transform: translateY(5px);
        }
        100% {
          opacity: 0;
          transform: translateY(0);
        }
      }
      @keyframes glitchShift {
        0% {
          transform: scale(1.05) translate(0, 0);
        }
        20% {
          transform: scale(1.05) translate(-4px, 1px);
        }
        40% {
          transform: scale(1.05) translate(4px, -2px);
        }
        60% {
          transform: scale(1.05) translate(-3px, 0);
        }
        80% {
          transform: scale(1.05) translate(3px, 1px);
        }
        100% {
          transform: scale(1.05) translate(0, 0);
        }
      }
      @keyframes glitchSplit {
        0%,
        100% {
          text-shadow: 0 0 8px currentColor;
        }
        25% {
          text-shadow:
            -3px 0 rgba(255, 0, 64, 0.9),
            3px 0 rgba(0, 255, 255, 0.9),
            0 0 8px currentColor;
        }
        50% {
          text-shadow:
            3px 0 rgba(255, 0, 64, 0.9),
            -3px 0 rgba(0, 255, 255, 0.9),
            0 0 8px currentColor;
        }
        75% {
          text-shadow:
            -2px 0 rgba(255, 0, 64, 0.9),
            2px 0 rgba(0, 255, 255, 0.9),
            0 0 8px currentColor;
        }
      }

      /* --- boot terminal that greets you on load --- */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 30;
        background: #050505;
        color: #a9ffce; /* phosphor green */
        padding: clamp(16px, 5vw, 60px);
        font: 14px/1.55 ui-monospace, "SF Mono", Menlo, Consolas,
          "Liberation Mono", "Courier New", monospace;
        text-shadow: 0 0 6px currentColor;
        overflow: hidden;
        transition: opacity 0.5s ease;
      }
      #boot.done {
        opacity: 0;
      }
      #bootlog {
        white-space: pre-wrap;
        margin: 0;
      }
      #bootlog::after {
        content: "";
        display: inline-block;
        width: 0.6ch;
        height: 1em;
        margin-left: 0.2ch;
        vertical-align: -0.12em;
        background: currentColor;
        animation: blink 1s steps(1) infinite;
      }

      /* --- convex CRT glass: heavy tube bezel + curvature + glossy sheen --- */
      .glass {
        position: fixed;
        inset: 0;
        z-index: 8;
        pointer-events: none;
        /* chunky rounded frame of the tube — the obvious "screen" edge */
        border: clamp(10px, 2.6vmin, 30px) solid #000;
        border-radius: clamp(24px, 6vmin, 70px);
        box-shadow:
          inset 0 0 16vmin 4vmin rgba(0, 0, 0, 0.85),
          /* strong curved edge falloff = the bulge */
          inset 0 0 0 2px rgba(255, 255, 255, 0.08),
          /* bright inner rim of the glass */ inset 0 0 3vmin 0
            rgba(120, 200, 255, 0.06); /* faint cool tube glow */
        background:
          radial-gradient(
            120% 78% at 50% -8%,
            rgba(255, 255, 255, 0.22) 0%,
            rgba(255, 255, 255, 0.08) 14%,
            rgba(255, 255, 255, 0) 46%
          ),
          /* top glossy sheen */
            radial-gradient(
              120% 90% at 50% 118%,
              rgba(255, 255, 255, 0.08) 0%,
              rgba(255, 255, 255, 0) 34%
            ),
          /* bottom reflection */
            radial-gradient(
              130% 130% at 50% 50%,
              rgba(0, 0, 0, 0) 55%,
              rgba(0, 0, 0, 0.45) 100%
            ); /* corner darkening reinforcing the curve */
      }
      /* content overscans a little so its edges tuck under the curved bezel */
      #field {
        transform-origin: 50% 50%;
        transform: scale(1.05);
      }

      /* hidden clickable links woven into the digit field; the same overscan
         transform as #field keeps each anchor exactly over its drawn letters */
      #links {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        transform-origin: 50% 50%;
        transform: scale(1.05);
      }
      #links a {
        position: absolute;
        display: block;
        pointer-events: none; /* enabled per-word only while the beam reveals it */
        cursor: pointer;
        text-decoration: none;
      }

      /* --- degauss: magnetic wobble + expanding colour ring + brightness surge --- */
      #degauss {
        position: fixed;
        inset: 0;
        z-index: 9;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(255, 255, 255, 0.16) 0%,
          rgba(255, 255, 255, 0) 60%
        );
        mix-blend-mode: screen;
      }
      #degauss::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 40vmax;
        height: 40vmax;
        margin: -20vmax 0 0 -20vmax;
        border-radius: 50%;
        transform: scale(0.05);
        background: radial-gradient(
          circle,
          transparent 36%,
          rgba(255, 0, 90, 0.35) 44%,
          rgba(255, 230, 0, 0.25) 49%,
          rgba(0, 200, 255, 0.35) 55%,
          transparent 64%
        );
      }
      body.degaussing #degauss {
        animation: degaussFlash 1.1s ease-out both;
      }
      body.degaussing #degauss::before {
        animation: degaussRing 1.1s cubic-bezier(0.15, 0.6, 0.3, 1) both;
      }
      body.degaussing #field {
        animation: degaussWarp 1.1s cubic-bezier(0.2, 0.7, 0.3, 1) both;
      }
      body.degaussing .type {
        animation: degaussFringe 1.1s ease-out both;
      }
      @keyframes degaussFlash {
        0% {
          opacity: 0;
        }
        6% {
          opacity: 0.55;
        }
        30% {
          opacity: 0.14;
        }
        100% {
          opacity: 0;
        }
      }
      @keyframes degaussRing {
        0% {
          transform: scale(0.05);
          opacity: 0;
        }
        12% {
          opacity: 0.95;
        }
        100% {
          transform: scale(3.4);
          opacity: 0;
        }
      }
      @keyframes degaussWarp {
        /* damped magnetic oscillation, settling back to the base scale(1.05) */
        0% {
          transform: scale(1.05);
          filter: brightness(1) saturate(1);
        }
        8% {
          transform: scale(1.09) skewX(2deg) translate(7px, -5px);
          filter: brightness(1.7) saturate(1.6);
        }
        20% {
          transform: scale(1.03) skewX(-1.6deg) translate(-6px, 4px);
          filter: brightness(1.25) saturate(1.3);
        }
        34% {
          transform: scale(1.075) skewX(1.1deg) translate(5px, -3px);
          filter: brightness(1.12);
        }
        50% {
          transform: scale(1.04) skewX(-0.7deg) translate(-3px, 2px);
        }
        68% {
          transform: scale(1.062) skewX(0.4deg) translate(2px, -1px);
        }
        84% {
          transform: scale(1.048) skewX(-0.2deg) translate(-1px, 1px);
        }
        100% {
          transform: scale(1.05) skewX(0) translate(0, 0);
          filter: brightness(1) saturate(1);
        }
      }
      @keyframes degaussFringe {
        0% {
          text-shadow: 0 0 8px currentColor;
        }
        10% {
          text-shadow:
            -7px 0 rgba(255, 0, 90, 0.9),
            7px 0 rgba(0, 200, 255, 0.9),
            0 0 14px currentColor;
        }
        30% {
          text-shadow:
            4px 0 rgba(255, 0, 90, 0.8),
            -4px 0 rgba(0, 200, 255, 0.8),
            0 0 10px currentColor;
        }
        55% {
          text-shadow:
            -2px 0 rgba(255, 0, 90, 0.6),
            2px 0 rgba(0, 200, 255, 0.6),
            0 0 9px currentColor;
        }
        100% {
          text-shadow: 0 0 8px currentColor;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .caret {
          animation: none;
        }
        .crt,
        .crt::after {
          animation: none;
        }
        #bootlog::after {
          animation: none;
        }
        body.glitching #glitch,
        body.glitching #field,
        body.glitching .type {
          animation: none;
        }
        body.degaussing #degauss,
        body.degaussing #degauss::before,
        body.degaussing #field,
        body.degaussing .type {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="field" aria-hidden="true"></canvas>
    <div id="links"></div>
    <div id="beam"></div>
    <div class="line">
      <span class="type"
        ><span id="txt"></span><span class="caret" aria-hidden="true"></span
      ></span>
    </div>
    <div class="crt" aria-hidden="true"></div>
    <div id="glitch" aria-hidden="true"></div>
    <div id="degauss" aria-hidden="true"></div>
    <div class="glass" aria-hidden="true"></div>
    <div id="boot" aria-hidden="true"><pre id="bootlog"></pre></div>

    <script>
      (function () {
        "use strict";
        const field = document.getElementById("field");
        const ctx = field.getContext("2d");
        const links = document.getElementById("links");
        const beam = document.getElementById("beam");
        const CHARS = "0123456789";
        // cap the backing store so hi-dpi screens don't allocate a giant buffer
        const DPR = Math.min(window.devicePixelRatio || 1, 2);
        const FONT =
          "15px ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace";
        const SP = 26; // grid spacing
        const DIM = 0; // fully hidden outside the beam
        const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

        // ---- who's visiting: locale, timezone, local time, native greeting ----
        const VISITOR = (function () {
          const raw = (navigator.language || "en").trim();
          const code = raw.toLowerCase().split("-")[0];
          const GREET = {
            en: "Hello",
            ru: "Привет",
            es: "Hola",
            fr: "Bonjour",
            de: "Hallo",
            it: "Ciao",
            pt: "Olá",
            ja: "こんにちは",
            zh: "你好",
            ko: "안녕하세요",
            ar: "مرحبا",
            he: "שלום",
            hi: "नमस्ते",
            el: "Γειά σου",
            tr: "Merhaba",
            pl: "Cześć",
            cs: "Ahoj",
            sv: "Hej",
            fi: "Hei",
            ro: "Salut",
            lv: "Sveiki",
            lt: "Labas",
            sr: "Zdravo",
            hr: "Zdravo",
            bg: "Здравейте",
            uk: "Привіт",
            kk: "Сәлем",
            vi: "Xin chào",
            th: "สวัสดี",
            id: "Halo",
            fil: "Kamusta",
            tl: "Kamusta",
            sw: "Jambo",
            zu: "Sawubona",
            ne: "Namaste",
            ha: "Sannu",
            haw: "Aloha",
          };
          let tz = "",
            time = "";
          try {
            tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
            time = new Intl.DateTimeFormat([], {
              hour: "2-digit",
              minute: "2-digit",
              hour12: false,
            }).format(new Date());
          } catch (e) {}
          return {
            locale: raw,
            greeting: GREET[code] || GREET[raw.toLowerCase()] || "Hello",
            tz: tz,
            time: time,
          };
        })();

        // scroll trades beam width vs brightness: 0 = narrow+bright, 1 = wide+faint, .5 = default
        let spread = 0.5,
          spreadTarget = 0.5;
        function clamp01(v) {
          return v < 0 ? 0 : v > 1 ? 1 : v;
        }

        let cells = []; // flat row-major grid: index = r * cols + c
        let cols = 0,
          rows = 0;
        let activeList = []; // only cells currently glowing (lit or fading)
        let fid = 0; // frame id, marks which cells the beam lit this frame

        // pointer + autopilot state
        let mx = innerWidth / 2,
          my = innerHeight / 2; // last real pointer
        let bx = mx,
          by = my; // eased beam position (drives light + halo)
        let lastActive = 0,
          firstFrame = true; // idle countdown starts at the first frame
        let active = false; // has the user driven the beam recently
        let rafId = 0,
          running = false; // drives pausing the loop on a hidden tab
        let prevShow = false;
        const IDLE = 2600; // ms of stillness before autopilot takes over
        const DECAY = reduce ? 0 : 0.9; // trail: how slowly a lit cell fades

        function rand(a, b) {
          return a + Math.random() * (b - a);
        }

        function build() {
          cells = [];
          activeList = [];
          const W = innerWidth,
            H = innerHeight;
          // one canvas backing store replaces thousands of DOM <span> nodes
          field.width = Math.round(W * DPR);
          field.height = Math.round(H * DPR);
          field.style.width = W + "px";
          field.style.height = H + "px";
          // draw in CSS-pixel coordinates; DPR only scales the backing store
          ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = FONT;
          cols = Math.ceil(W / SP) + 1;
          rows = Math.ceil(H / SP) + 1;
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const x = c * SP + SP / 2;
              const y = r * SP + SP / 2;
              cells.push({
                x: x,
                y: y,
                w: rand(0.4, 1),
                phase: rand(0, Math.PI * 2),
                freq: rand(0.9, 1.7), // per-cell tremble speed (uneasy, out of sync)
                g: 0,
                ch: CHARS[(Math.random() * CHARS.length) | 0], // the digit drawn
                active: false, // is it in activeList (glowing or fading)
                tf: -1, // frame id when the beam last lit it
                tv: 0, // that frame's target glow
              });
            }
          }
          placeWords();
        }

        // ---- hidden easter-egg links woven into the digit field ----
        const WORDS = [
          { text: "@in7erval", url: "https://github.com/in7erval" },
          { text: "walle2.0", url: "https://github.com/in7erval/Wall-e-2.0" },
          { text: "allconnect", url: "https://github.com/in7erval/allconnect" },
        ];
        let linkWords = []; // { a: <anchor>, cells: [...], on: bool }

        // drop each word into a grid row (its letters replace the random digits)
        // and lay a transparent, per-word clickable anchor exactly over it
        function placeWords() {
          links.innerHTML = "";
          linkWords = [];
          if (!cols || !rows) return;
          const fracs = [0.17, 0.7, 0.85]; // vertical spots, clear of the centre
          for (let wi = 0; wi < WORDS.length; wi++) {
            const word = WORDS[wi];
            const len = word.text.length;
            if (len >= cols) continue; // doesn't fit this viewport
            const r = Math.min(
              rows - 2,
              Math.max(1, Math.round(rows * fracs[wi % fracs.length])),
            );
            const maxStart = cols - len - 1;
            const c0 =
              maxStart <= 1 ? 0 : 1 + ((Math.random() * (maxStart - 1)) | 0);
            const wcells = [];
            for (let k = 0; k < len; k++) {
              const cell = cells[r * cols + (c0 + k)];
              if (!cell) continue;
              cell.ch = word.text.charAt(k);
              cell.link = true; // exempt from the random digit-flip
              wcells.push(cell);
            }
            if (!wcells.length) continue;
            const a = document.createElement("a");
            a.href = word.url;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.title = word.text;
            a.setAttribute("aria-label", word.text);
            a.tabIndex = -1;
            a.style.left = c0 * SP + "px";
            a.style.top = r * SP + "px";
            a.style.width = len * SP + "px";
            a.style.height = SP + "px";
            links.appendChild(a);
            linkWords.push({ a: a, cells: wcells, on: false });
          }
        }

        function move(e) {
          const p = e.touches ? e.touches[0] : e;
          mx = p.clientX;
          my = p.clientY;
          active = true;
          lastActive = performance.now();
        }
        function leave() {
          // let autopilot resume shortly after the pointer leaves
          active = false;
          lastActive = performance.now() - IDLE;
        }

        function frame(t) {
          if (firstFrame) {
            firstFrame = false;
            lastActive = t; // begin the idle countdown now
          }
          if (!reduce) flow(t);

          // ease spread toward the scroll target
          spread += (spreadTarget - spread) * 0.15;
          const rad = 100 + 210 * spread; // 100 (narrow) .. 310 (wide), mid ~205
          const inten = 1.7 - 1.5 * spread; // 1.7 (bright) .. 0.2 (faint), mid ~0.95
          const R2 = rad * rad;

          // --- beam target: real pointer, or a wandering autopilot when idle ---
          const W = innerWidth,
            H = innerHeight;
          const idle = t - lastActive > IDLE;
          const show = idle || active;
          let tx, ty;
          if (idle) {
            tx = W * 0.5 + W * 0.36 * Math.sin(t * 0.00022) * Math.cos(t * 0.00007);
            ty = H * 0.5 + H * 0.34 * Math.sin(t * 0.00031 + 1.2);
          } else {
            tx = mx;
            ty = my;
          }
          if (show && !prevShow) {
            bx = tx;
            by = ty;
          } // snap on first appearance, no sweep-in
          prevShow = show;
          if (show) {
            const k = idle ? 0.03 : 0.18; // slow dreamy glide vs snappy follow
            bx += (tx - bx) * k;
            by += (ty - by) * k;
          } else {
            bx = -9999;
            by = -9999;
          }
          beam.style.opacity = show ? "1" : "0";

          // --- light ONLY the cells inside the beam's bounding box ---
          // (a regular grid, so we can jump straight to the affected rows/cols
          //  instead of scanning all ~3000+ cells every frame)
          fid++;
          if (show && cols > 0) {
            const c0 = Math.max(0, ((bx - rad) / SP) | 0);
            const c1 = Math.min(cols - 1, Math.ceil((bx + rad) / SP));
            const r0 = Math.max(0, ((by - rad) / SP) | 0);
            const r1 = Math.min(rows - 1, Math.ceil((by + rad) / SP));
            for (let r = r0; r <= r1; r++) {
              const rowBase = r * cols;
              for (let c = c0; c <= c1; c++) {
                const cell = cells[rowBase + c];
                const dx = cell.x - bx,
                  dy = cell.y - by;
                const d2 = dx * dx + dy * dy;
                if (d2 >= R2) continue;
                let base = 1 - Math.sqrt(d2) / rad; // 0..1
                base = base * base; // ease
                const flick = reduce
                  ? 1
                  : 0.55 + 0.45 * Math.sin(t * 0.006 + cell.phase);
                let target = base * cell.w * flick * inten;
                if (target > 1) target = 1;
                cell.tf = fid; // mark: lit this frame
                cell.tv = target;
                if (!cell.active) {
                  cell.active = true;
                  activeList.push(cell);
                }
              }
            }
          }

          // --- draw only the glowing/fading cells straight to the canvas ---
          ctx.clearRect(0, 0, W, H);
          // bake the per-cell alpha into BOTH fill and shadow colour instead of
          // using globalAlpha: WebKit/Safari doesn't fade a fillText shadow by
          // globalAlpha, so faint edge cells kept a full-strength halo and the
          // beam's soft falloff washed out into a solid patch of digits.
          const cr = curFg[0],
            cg = curFg[1],
            cb = curFg[2];
          ctx.shadowBlur = 6; // canvas glow, replacing per-span text-shadow
          let w = 0;
          for (let i = 0; i < activeList.length; i++) {
            const cell = activeList[i];
            const target = cell.tf === fid ? cell.tv : 0;
            cell.g *= DECAY; // previous glow fades -> trail
            if (target > cell.g) cell.g = target; // beam re-lights instantly
            const g = cell.g;

            if (g <= 0.004) {
              cell.active = false; // fully dark again: drop from the list
              continue;
            }
            const col =
              "rgba(" + cr + "," + cg + "," + cb + "," + g.toFixed(3) + ")";
            ctx.fillStyle = col;
            ctx.shadowColor = col;

            // --- "scary numbers": cells under the beam tremble & pulse ---
            if (!reduce && g > 0.05) {
              const amp = 2.6 * g; // stronger tremble the brighter it burns
              const f = cell.freq;
              const jx =
                Math.sin(t * 0.017 * f + cell.phase) * amp +
                (Math.random() - 0.5) * amp;
              const jy =
                Math.cos(t * 0.019 * f + cell.phase * 1.3) * amp +
                (Math.random() - 0.5) * amp;
              const s = 1 + 0.14 * g * Math.sin(t * 0.011 * f + cell.phase);
              ctx.save();
              ctx.translate(cell.x + jx, cell.y + jy);
              ctx.scale(s, s);
              ctx.fillText(cell.ch, 0, 0);
              ctx.restore();
              // occasionally a bright cell flips its digit — restless, alive
              // (link cells keep their letter so the hidden words stay legible)
              if (!cell.link && g > 0.55 && Math.random() < 0.02) {
                cell.ch = CHARS[(Math.random() * CHARS.length) | 0];
              }
            } else {
              ctx.fillText(cell.ch, cell.x, cell.y);
            }
            activeList[w++] = cell; // keep survivors, compacting the list
          }
          activeList.length = w;
          ctx.shadowBlur = 0;

          // a hidden word's link only becomes clickable while the beam lights it
          // (so the cursor turns into a pointer right as the word is revealed)
          for (let i = 0; i < linkWords.length; i++) {
            const lw = linkWords[i];
            let mg = 0;
            for (let j = 0; j < lw.cells.length; j++) {
              if (lw.cells[j].g > mg) mg = lw.cells[j].g;
            }
            const on = mg > 0.45;
            if (on !== lw.on) {
              lw.on = on;
              lw.a.style.pointerEvents = on ? "auto" : "none";
            }
          }

          // beam halo follows the (eased) beam, scales with width, fades with intensity
          beam.style.transform =
            "translate(" +
            bx +
            "px," +
            by +
            "px) scale(" +
            (rad / 205).toFixed(3) +
            ")";
          // the gradient only shifts with palette/intensity, both slow — rebuild
          // it a few times a second instead of every single frame
          if (fid % 6 === 0) {
            beam.style.background =
              "radial-gradient(circle, " +
              rgba(curFg, (0.16 * inten).toFixed(3)) +
              " 0%, " +
              rgba(curFg, (0.08 * inten).toFixed(3)) +
              " 38%, transparent 72%)";
          }

          rafId = requestAnimationFrame(frame);
        }

        // ---- palettes: continuous crossfade between them ----
        const PAIRS = [
          ["#121212", "#FFFFFF"],
          ["#121212", "#FF5722"],
          ["#121212", "#A8DADC"],
          ["#121212", "#B39CD0"],
          ["#121212", "#F1C1CC"],
          ["#121212", "#A63A6E"],
          ["#121212", "#8259D6"],
          ["#121212", "#1E90FF"],
          ["#121212", "#00FF85"],
          ["#121212", "#FFEB3B"],
        ];
        const body = document.body;
        function hex(h) {
          return [
            parseInt(h.slice(1, 3), 16),
            parseInt(h.slice(3, 5), 16),
            parseInt(h.slice(5, 7), 16),
          ];
        }
        const RGB = PAIRS.map(function (p) {
          return { bg: hex(p[0]), fg: hex(p[1]) };
        });
        let curFg = RGB[0].fg; // current interpolated text colour, used by the beam
        const SEG = 5600; // ms for one palette to flow into the next
        function mix(a, b, e) {
          return [
            Math.round(a[0] + (b[0] - a[0]) * e),
            Math.round(a[1] + (b[1] - a[1]) * e),
            Math.round(a[2] + (b[2] - a[2]) * e),
          ];
        }
        function rgb(c) {
          return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
        }
        function rgba(c, a) {
          return "rgba(" + c[0] + "," + c[1] + "," + c[2] + "," + a + ")";
        }
        function applyColors(bg, fg) {
          body.style.background = rgb(bg);
          body.style.setProperty("--fg", rgb(fg));
          curFg = fg;
        }
        function flow(t) {
          const N = RGB.length,
            g = t / SEG;
          const idx = Math.floor(g) % N;
          let e = g - Math.floor(g);
          e = e * e * (3 - 2 * e); // smoothstep for a gentle ease
          const a = RGB[idx],
            b = RGB[(idx + 1) % N];
          applyColors(mix(a.bg, b.bg, e), mix(a.fg, b.fg, e));
        }
        applyColors(RGB[0].bg, RGB[0].fg); // initial (and the static palette when motion is reduced)

        // ---- looping headline: "hello" around the world ----
        (function () {
          // greetings in many languages of the world
          const HELLOS = [
            "Привет", // Russian
            "Hello", // English
            "Hola", // Spanish
            "Bonjour", // French
            "Hallo", // German
            "Ciao", // Italian
            "Olá", // Portuguese
            "こんにちは", // Japanese
            "你好", // Chinese
            "안녕하세요", // Korean
            "مرحبا", // Arabic
            "שלום", // Hebrew
            "नमस्ते", // Hindi
            "Γειά σου", // Greek
            "Merhaba", // Turkish
            "Cześć", // Polish
            "Ahoj", // Czech
            "Hej", // Swedish
            "Hei", // Finnish
            "Salut", // Romanian
            "Sveiki", // Latvian
            "Labas", // Lithuanian
            "Zdravo", // Serbian/Croatian
            "Здравейте", // Bulgarian
            "Привіт", // Ukrainian
            "Сәлем", // Kazakh
            "Xin chào", // Vietnamese
            "สวัสดี", // Thai
            "Halo", // Indonesian
            "Kamusta", // Filipino
            "Jambo", // Swahili
            "Sawubona", // Zulu
            "Namaste", // Nepali
            "Sannu", // Hausa
            "Aloha", // Hawaiian
          ];
          const el = document.getElementById("txt");
          let text = VISITOR.greeting; // first pass: greeting in the visitor's language
          function next() {
            let t;
            do {
              t = HELLOS[(Math.random() * HELLOS.length) | 0];
            } while (t === text);
            text = t;
          }

          if (reduce) {
            el.textContent = text;
            return;
          }

          const TYPE = 95,
            ERASE = 42,
            HOLD = 2200,
            GAP = 480;
          function type(i) {
            el.textContent = text.slice(0, i);
            if (i < text.length)
              setTimeout(function () {
                type(i + 1);
              }, TYPE);
            else
              setTimeout(function () {
                erase(text.length);
              }, HOLD);
          }
          function erase(i) {
            el.textContent = text.slice(0, i);
            if (i > 0)
              setTimeout(function () {
                erase(i - 1);
              }, ERASE);
            else {
              next();
              setTimeout(function () {
                type(0);
              }, GAP);
            } // new random order each time
          }
          type(0);
        })();

        let rz;
        addEventListener("resize", function () {
          clearTimeout(rz);
          rz = setTimeout(build, 150);
        });
        addEventListener("pointermove", move, { passive: true });
        addEventListener("pointerdown", move, { passive: true });
        addEventListener("pointerleave", leave);
        addEventListener("touchmove", move, { passive: true });

        // scroll: down -> wider & fainter, up -> narrower & brighter
        addEventListener(
          "wheel",
          function (e) {
            e.preventDefault();
            spreadTarget = clamp01(spreadTarget + e.deltaY * 0.0009);
          },
          { passive: false },
        );

        // ---- boot terminal: fake power-on log, then fade to the scene ----
        (function () {
          const boot = document.getElementById("boot");
          const log = document.getElementById("bootlog");
          if (!boot || !log) return;
          // pad a label to a fixed width with dots, then append the value
          function row(label, value) {
            const dots = ".".repeat(Math.max(3, 33 - label.length));
            return label + " " + dots + " " + value;
          }

          function truncate(s, n) {
            s = String(s);
            return s.length > n ? s.slice(0, n - 1) + "…" : s;
          }

          // whatever the browser willingly tells us about the visitor
          function probeDump() {
            const s = window.screen || {};
            const nav = navigator;
            const conn =
              nav.connection || nav.mozConnection || nav.webkitConnection;
            return [
              "",
              "> fingerprinting visitor",
              row(
                "platform",
                nav.platform ||
                  (nav.userAgentData && nav.userAgentData.platform) ||
                  "?",
              ),
              row("cpu threads", nav.hardwareConcurrency || "?"),
              row("device memory", nav.deviceMemory ? nav.deviceMemory + " GB" : "?"),
              row(
                "screen",
                (s.width || "?") +
                  "x" +
                  (s.height || "?") +
                  " @" +
                  (window.devicePixelRatio || 1) +
                  "x",
              ),
              row("viewport", innerWidth + "x" + innerHeight),
              row("touch points", nav.maxTouchPoints || 0),
              row("connection", conn && conn.effectiveType ? conn.effectiveType : "?"),
              row("network", nav.onLine ? "online" : "offline"),
              row("cookies", nav.cookieEnabled ? "enabled" : "disabled"),
              row("do-not-track", nav.doNotTrack === "1" ? "on" : "off"),
              "user agent:",
              "  " + truncate(nav.userAgent, 120),
            ];
          }

          // dump a Web Storage area (localStorage / sessionStorage)
          function storageDump(label, store) {
            let n;
            try {
              n = store.length;
            } catch (e) {
              return [row(label, "blocked")];
            }
            const out = [
              row(label, n + (n === 1 ? " key" : " keys")),
            ];
            for (let i = 0; i < n && i < 8; i++) {
              const k = store.key(i);
              let v = "";
              try {
                v = store.getItem(k);
              } catch (e) {}
              out.push("  " + truncate(k, 24) + " = " + truncate(v, 40));
            }
            if (n > 8) out.push("  … +" + (n - 8) + " more");
            return out;
          }

          // dump this site's readable cookies (same-origin, non-HttpOnly only —
          // the browser sandbox forbids reading any other site's cookies)
          function cookieDump() {
            const jar = document.cookie ? document.cookie.split("; ") : [];
            const out = [
              "",
              row("reading cookies", jar.length + (jar.length === 1 ? " entry" : " entries")),
            ];
            if (!jar.length) {
              out.push("  <the cookie jar is empty>");
              return out;
            }
            jar.forEach(function (c) {
              const eq = c.indexOf("=");
              const k = eq >= 0 ? c.slice(0, eq) : c;
              let v = eq >= 0 ? c.slice(eq + 1) : "";
              try {
                v = decodeURIComponent(v);
              } catch (e) {}
              out.push("  " + k + " = " + (v || "∅"));
            });
            return out;
          }

          const lines = [
            "RETICULUM TERMINAL  v3.7.1",
            "(c) macrodata refinement division",
            "",
            row("detecting locale", VISITOR.locale),
            row("resolving timezone", VISITOR.tz || "unknown"),
            row("local time", VISITOR.time || "--:--"),
            row("initializing display", "OK"),
            row("loading character matrix", "OK"),
            row("calibrating flashlight", "OK"),
            row("mounting /dev/greetings", "OK"),
            row("spawning numbers", "OK"),
          ]
            .concat(probeDump())
            .concat([""])
            .concat(cookieDump())
            .concat([""])
            .concat(storageDump("localStorage", window.localStorage))
            .concat(storageDump("sessionStorage", window.sessionStorage))
            .concat([
              "",
              "greeting visitor > " + VISITOR.greeting,
              "",
              "hint: double-click or press [D] to degauss",
              "",
              "READY.",
            ]);
          function finish() {
            boot.classList.add("done");
            setTimeout(function () {
              boot.remove();
            }, 600);
          }
          if (reduce) {
            log.textContent = lines.join("\n");
            boot.scrollTop = boot.scrollHeight;
            setTimeout(finish, 700);
            return;
          }
          let i = 0;
          (function step() {
            if (i < lines.length) {
              log.textContent += (i ? "\n" : "") + lines[i];
              boot.scrollTop = boot.scrollHeight; // keep the newest line in view
              const line = lines[i];
              i++;
              // blank lines flick by; dotted "loading" rows land with a beat of latency
              const delay =
                line === "" ? 55 : /\.{3,}/.test(line) ? rand(130, 250) : rand(90, 160);
              setTimeout(step, delay);
            } else {
              setTimeout(finish, 550);
            }
          })();
        })();

        // ---- glitch bursts: fire at random intervals, sometimes in pairs ----
        (function () {
          if (reduce) return;
          const b = document.body;
          function burst() {
            b.classList.remove("glitching");
            void b.offsetWidth; // reflow so the animation can retrigger
            b.classList.add("glitching");
            setTimeout(function () {
              b.classList.remove("glitching");
            }, 210);
            // occasional stutter: a quick second flash right after
            if (Math.random() < 0.35) {
              setTimeout(burst, rand(240, 420));
            }
          }
          function loop() {
            setTimeout(function () {
              burst();
              loop();
            }, rand(2600, 7200));
          }
          loop();
        })();

        // ---- degauss: the classic CRT "de-magnetise" wobble + thunk ----
        (function () {
          const b = document.body;
          let degaussTO = 0;
          let actx = null;

          // low sine drop + a short burst of noise = the "bdvvm" thunk
          function thunk() {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;
            try {
              actx = actx || new AC();
              if (actx.state === "suspended") actx.resume();
              const t0 = actx.currentTime;
              const o = actx.createOscillator();
              const g = actx.createGain();
              o.type = "sine";
              o.frequency.setValueAtTime(150, t0);
              o.frequency.exponentialRampToValueAtTime(42, t0 + 0.22);
              g.gain.setValueAtTime(0.0001, t0);
              g.gain.exponentialRampToValueAtTime(0.32, t0 + 0.012);
              g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.4);
              o.connect(g).connect(actx.destination);
              o.start(t0);
              o.stop(t0 + 0.42);

              const n = actx.createBufferSource();
              const buf = actx.createBuffer(
                1,
                (actx.sampleRate * 0.16) | 0,
                actx.sampleRate,
              );
              const d = buf.getChannelData(0);
              for (let i = 0; i < d.length; i++) {
                d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
              }
              n.buffer = buf;
              const ng = actx.createGain();
              ng.gain.setValueAtTime(0.09, t0);
              ng.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.16);
              n.connect(ng).connect(actx.destination);
              n.start(t0);
            } catch (e) {}
          }

          function degauss(sound) {
            if (reduce) return;
            b.classList.remove("degaussing");
            void b.offsetWidth; // reflow so the animation retriggers
            b.classList.add("degaussing");
            if (sound) thunk();
            clearTimeout(degaussTO);
            degaussTO = setTimeout(function () {
              b.classList.remove("degaussing");
            }, 1150);
          }

          // user-driven: double-click or press [D] (sound needs the gesture)
          addEventListener("dblclick", function () {
            degauss(true);
          });
          addEventListener("keydown", function (e) {
            if ((e.key === "d" || e.key === "D") && !e.metaKey && !e.ctrlKey) {
              degauss(true);
            }
          });
          // power-on feel: silent degauss after boot, and when you return to the tab
          addEventListener("visibilitychange", function () {
            if (!document.hidden) degauss(false);
          });
          setTimeout(function () {
            degauss(false);
          }, 3200);

          // let the rest of the page reach it (e.g. a future button)
          window.__degauss = degauss;
        })();

        // start / stop the animation loop; stopping frees the tab's CPU & GPU
        // work entirely while it's in the background
        function start() {
          if (running) return;
          running = true;
          rafId = requestAnimationFrame(frame);
        }
        function stop() {
          running = false;
          cancelAnimationFrame(rafId);
        }
        addEventListener("visibilitychange", function () {
          if (document.hidden) stop();
          else start();
        });

        build();
        start();
      })();
    </script>
  </body>
</html>
