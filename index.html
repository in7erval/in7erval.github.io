<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Under construction</title>
  <meta name="description" content="Something is being built here.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0d0d0d;
      --ink:#f2f2f2;
      --muted:#8a8a8a;
      --hazard:#ffc300;
      --stripe:#111111;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:var(--bg);
      color:var(--ink);
      font-family:"Space Mono",ui-monospace,monospace;
      min-height:100dvh;
      display:grid;
      place-items:center;
      overflow:hidden;
      position:relative;
    }

    /* --- Construction tape strips --- */
    .tape{
      position:absolute;
      left:50%;
      width:200vw;
      transform-origin:center;
      border-top:2px solid #000;
      border-bottom:2px solid #000;
      box-shadow:0 12px 30px rgba(0,0,0,.55);
      z-index:1;
      will-change:transform;
    }
    /* Yellow/black hazard chevrons */
    .tape--hazard{
      height:58px;
      background:repeating-linear-gradient(45deg,
        var(--stripe) 0 22px,
        var(--hazard) 22px 44px);
      background-size:62px 62px;
      animation:crawl 3.5s linear infinite;
    }
    .tape--a{top:16%;transform:translateX(-50%) rotate(-7deg)}
    .tape--c{top:80%;transform:translateX(-50%) rotate(5deg)}

    /* Printed text tape */
    .tape--text{
      height:54px;
      top:48%;
      background:var(--hazard);
      overflow:hidden;
      display:flex;
      align-items:center;
      transform:translateX(-50%) rotate(3deg);
    }
    .track{
      display:flex;
      white-space:nowrap;
      animation:slide 24s linear infinite;
    }
    .track span{
      font-family:"Anton",sans-serif;
      font-size:30px;
      line-height:1;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#111;
      padding-right:44px;
    }

    /* Scrim so the centre text stays readable over the tape */
    .scrim{
      position:absolute;inset:0;z-index:2;
      background:radial-gradient(ellipse 70% 55% at 50% 50%,
        rgba(10,10,10,.9) 0%,
        rgba(10,10,10,.55) 45%,
        rgba(10,10,10,0) 78%);
      pointer-events:none;
    }

    /* --- Centre content --- */
    .stage{
      position:relative;
      z-index:3;
      text-align:center;
      padding:24px;
    }
    .eyebrow{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.34em;
      font-size:.72rem;
      margin-bottom:1.1rem;
    }
    .title{
      font-family:"Anton",sans-serif;
      text-transform:uppercase;
      font-size:clamp(2.8rem,13vw,7.5rem);
      line-height:.9;
      letter-spacing:.01em;
      color:var(--ink);
    }
    .title .caret{
      color:var(--hazard);
      animation:blink 1.1s steps(1) infinite;
    }
    .subtitle{
      margin-top:1.4rem;
      color:#cfcfcf;
      font-size:clamp(.9rem,2.6vw,1.05rem);
    }
    .handle{
      margin-top:.4rem;
      font-size:.9rem;
      color:var(--muted);
    }
    .handle a{
      color:var(--hazard);
      text-decoration:none;
      border-bottom:1px solid rgba(255,195,0,.4);
    }
    .handle a:hover,
    .handle a:focus-visible{border-bottom-color:var(--hazard)}

    @keyframes crawl{to{background-position:62px 0}}
    @keyframes slide{to{transform:translateX(-50%)}}
    @keyframes blink{50%{opacity:0}}

    @media (prefers-reduced-motion:reduce){
      .tape--hazard,.track,.title .caret{animation:none}
    }
  </style>
</head>
<body>
  <!-- background tape -->
  <div class="tape tape--hazard tape--a" aria-hidden="true"></div>

  <div class="tape tape--text" aria-hidden="true">
    <div class="track">
      <span>Under construction • Under construction • Under construction • Under construction • </span>
      <span>Under construction • Under construction • Under construction • Under construction • </span>
    </div>
  </div>

  <div class="tape tape--hazard tape--c" aria-hidden="true"></div>

  <div class="scrim" aria-hidden="true"></div>

  <!-- centre message -->
  <main class="stage">
    <p class="eyebrow">Work in progress</p>
    <h1 class="title">Under<br>construction<span class="caret">_</span></h1>
    <p class="subtitle">Something is being built here.</p>
  </main>
</body>
</html>
