<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>привет миру</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: #0a0a0a;
        color: var(--fg);
        --fg: #f8f7f4;
        min-height: 100dvh;
        overflow: hidden;
        font-family:
          ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono",
          "Courier New", monospace;
      }

      /* field of faint random letters revealed by the "flashlight" */
      #field {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }
      #field .l {
        position: absolute;
        transform: translate(-50%, -50%);
        font-size: 15px;
        line-height: 1;
        color: var(--fg);
        text-shadow: 0 0 6px currentColor;
        opacity: 0;
        will-change: opacity, transform;
      }

      /* soft flashlight halo following the cursor */
      #beam {
        position: fixed;
        z-index: 2;
        width: 410px;
        height: 410px;
        left: 0;
        top: 0;
        margin: -205px 0 0 -205px;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(255, 255, 255, 0.02) 35%,
          transparent 70%
        );
      }

      /* the actual message, always readable, on top */
      .line {
        position: fixed;
        inset: 0;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .type {
        font-size: clamp(1.1rem, 4.5vw, 1.9rem);
        line-height: 1;
        letter-spacing: 0.02em;
        white-space: pre;
        color: var(--fg);
        text-shadow: 0 0 8px currentColor;
      }
      .caret {
        display: inline-block;
        width: 0.5ch;
        height: 1em;
        margin-left: 0.12em;
        vertical-align: -0.12em;
        background: var(--fg);
        animation: blink 1s steps(1) infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      /* --- CRT overlay: scanlines + vignette + flicker --- */
      .crt {
        position: fixed;
        inset: 0;
        z-index: 6;
        pointer-events: none;
        animation: crtflicker 4.5s steps(30) infinite;
      }
      .crt::before {
        /* scanlines */
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0 2px,
          rgba(0, 0, 0, 0.22) 2px 4px
        );
        mix-blend-mode: multiply;
      }
      .crt::after {
        /* vignette + slow rolling scan band */
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)) top /
            100% 40% no-repeat,
          radial-gradient(
            ellipse at center,
            rgba(0, 0, 0, 0) 52%,
            rgba(0, 0, 0, 0.55) 100%
          );
        background-position:
          0 -40%,
          0 0;
        animation: crtroll 7s linear infinite;
      }
      @keyframes crtflicker {
        0%,
        100% {
          opacity: 1;
        }
        48% {
          opacity: 1;
        }
        50% {
          opacity: 0.94;
        }
        52% {
          opacity: 1;
        }
        70% {
          opacity: 0.97;
        }
        72% {
          opacity: 1;
        }
      }
      @keyframes crtroll {
        0% {
          background-position:
            0 -40%,
            0 0;
        }
        100% {
          background-position:
            0 140%,
            0 0;
        }
      }
      /* --- glitch bursts: RGB-split + horizontal judder --- */
      #glitch {
        position: fixed;
        inset: 0;
        z-index: 7;
        pointer-events: none;
        opacity: 0;
        mix-blend-mode: screen;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0 6px,
          rgba(255, 0, 64, 0.07) 6px 8px,
          transparent 8px 14px,
          rgba(0, 255, 255, 0.07) 14px 16px
        );
      }
      body.glitching #glitch {
        animation: glitchBands 0.2s steps(3) both;
      }
      body.glitching #field {
        animation: glitchShift 0.2s steps(2) both;
      }
      body.glitching .type {
        animation: glitchSplit 0.2s steps(1) both;
      }
      @keyframes glitchBands {
        0% {
          opacity: 0;
          transform: translateY(0);
        }
        30% {
          opacity: 1;
          transform: translateY(-7px);
        }
        60% {
          opacity: 0.7;
          transform: translateY(5px);
        }
        100% {
          opacity: 0;
          transform: translateY(0);
        }
      }
      @keyframes glitchShift {
        0% {
          transform: translate(0, 0);
        }
        20% {
          transform: translate(-4px, 1px);
        }
        40% {
          transform: translate(4px, -2px);
        }
        60% {
          transform: translate(-3px, 0);
        }
        80% {
          transform: translate(3px, 1px);
        }
        100% {
          transform: translate(0, 0);
        }
      }
      @keyframes glitchSplit {
        0%,
        100% {
          text-shadow: 0 0 8px currentColor;
        }
        25% {
          text-shadow:
            -3px 0 rgba(255, 0, 64, 0.9),
            3px 0 rgba(0, 255, 255, 0.9),
            0 0 8px currentColor;
        }
        50% {
          text-shadow:
            3px 0 rgba(255, 0, 64, 0.9),
            -3px 0 rgba(0, 255, 255, 0.9),
            0 0 8px currentColor;
        }
        75% {
          text-shadow:
            -2px 0 rgba(255, 0, 64, 0.9),
            2px 0 rgba(0, 255, 255, 0.9),
            0 0 8px currentColor;
        }
      }

      /* --- boot terminal that greets you on load --- */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 30;
        background: #050505;
        color: #a9ffce; /* phosphor green */
        padding: clamp(16px, 5vw, 60px);
        font: 14px/1.55 ui-monospace, "SF Mono", Menlo, Consolas,
          "Liberation Mono", "Courier New", monospace;
        text-shadow: 0 0 6px currentColor;
        overflow: hidden;
        transition: opacity 0.5s ease;
      }
      #boot.done {
        opacity: 0;
      }
      #bootlog {
        white-space: pre-wrap;
        margin: 0;
      }
      #bootlog::after {
        content: "";
        display: inline-block;
        width: 0.6ch;
        height: 1em;
        margin-left: 0.2ch;
        vertical-align: -0.12em;
        background: currentColor;
        animation: blink 1s steps(1) infinite;
      }

      /* --- convex CRT glass: curvature, edge falloff, glossy highlight --- */
      .glass {
        position: fixed;
        inset: 0;
        z-index: 8;
        pointer-events: none;
        border-radius: 5.5vmin; /* rounded tube corners */
        box-shadow:
          inset 0 0 11vmin 3vmin rgba(0, 0, 0, 0.5),
          /* curved edge darkening = the bulge */ inset 0 0 0 1px
            rgba(255, 255, 255, 0.05); /* faint rim light */
        background:
          radial-gradient(
            140% 100% at 50% -12%,
            rgba(255, 255, 255, 0.13) 0%,
            rgba(255, 255, 255, 0.05) 16%,
            rgba(255, 255, 255, 0) 40%
          ),
          /* top glossy sheen */
            radial-gradient(
              120% 120% at 50% 116%,
              rgba(255, 255, 255, 0.05) 0%,
              rgba(255, 255, 255, 0) 32%
            ); /* soft bottom reflection */
      }
      /* the picture itself bows outward a touch, strongest at the centre */
      #field {
        transform-origin: 50% 50%;
        transform: perspective(1400px) scale(1.012);
      }

      @media (prefers-reduced-motion: reduce) {
        .caret {
          animation: none;
        }
        .crt,
        .crt::after {
          animation: none;
        }
        #bootlog::after {
          animation: none;
        }
        body.glitching #glitch,
        body.glitching #field,
        body.glitching .type {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="field" aria-hidden="true"></div>
    <div id="beam"></div>
    <div class="line">
      <span class="type"
        ><span id="txt"></span><span class="caret" aria-hidden="true"></span
      ></span>
    </div>
    <div class="crt" aria-hidden="true"></div>
    <div id="glitch" aria-hidden="true"></div>
    <div class="glass" aria-hidden="true"></div>
    <div id="boot" aria-hidden="true"><pre id="bootlog"></pre></div>

    <script>
      (function () {
        "use strict";
        const field = document.getElementById("field");
        const beam = document.getElementById("beam");
        const CHARS = "0123456789";
        const SP = 26; // grid spacing
        const DIM = 0; // fully hidden outside the beam
        const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

        // ---- who's visiting: locale, timezone, local time, native greeting ----
        const VISITOR = (function () {
          const raw = (navigator.language || "en").trim();
          const code = raw.toLowerCase().split("-")[0];
          const GREET = {
            en: "Hello",
            ru: "Привет",
            es: "Hola",
            fr: "Bonjour",
            de: "Hallo",
            it: "Ciao",
            pt: "Olá",
            ja: "こんにちは",
            zh: "你好",
            ko: "안녕하세요",
            ar: "مرحبا",
            he: "שלום",
            hi: "नमस्ते",
            el: "Γειά σου",
            tr: "Merhaba",
            pl: "Cześć",
            cs: "Ahoj",
            sv: "Hej",
            fi: "Hei",
            ro: "Salut",
            lv: "Sveiki",
            lt: "Labas",
            sr: "Zdravo",
            hr: "Zdravo",
            bg: "Здравейте",
            uk: "Привіт",
            kk: "Сәлем",
            vi: "Xin chào",
            th: "สวัสดี",
            id: "Halo",
            fil: "Kamusta",
            tl: "Kamusta",
            sw: "Jambo",
            zu: "Sawubona",
            ne: "Namaste",
            ha: "Sannu",
            haw: "Aloha",
          };
          let tz = "",
            time = "";
          try {
            tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
            time = new Intl.DateTimeFormat([], {
              hour: "2-digit",
              minute: "2-digit",
              hour12: false,
            }).format(new Date());
          } catch (e) {}
          return {
            locale: raw,
            greeting: GREET[code] || GREET[raw.toLowerCase()] || "Hello",
            tz: tz,
            time: time,
          };
        })();

        // scroll trades beam width vs brightness: 0 = narrow+bright, 1 = wide+faint, .5 = default
        let spread = 0.5,
          spreadTarget = 0.5;
        function clamp01(v) {
          return v < 0 ? 0 : v > 1 ? 1 : v;
        }

        let cells = []; // {el,x,y,w,phase,g}

        // pointer + autopilot state
        let mx = innerWidth / 2,
          my = innerHeight / 2; // last real pointer
        let bx = mx,
          by = my; // eased beam position (drives light + halo)
        let lastActive = 0,
          firstFrame = true; // idle countdown starts at the first frame
        let active = false; // has the user driven the beam recently
        let prevShow = false;
        const IDLE = 2600; // ms of stillness before autopilot takes over
        const DECAY = reduce ? 0 : 0.9; // trail: how slowly a lit cell fades

        function rand(a, b) {
          return a + Math.random() * (b - a);
        }

        function build() {
          field.innerHTML = "";
          cells = [];
          const W = innerWidth,
            H = innerHeight;
          const cols = Math.ceil(W / SP) + 1,
            rows = Math.ceil(H / SP) + 1;
          const frag = document.createDocumentFragment();
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const el = document.createElement("span");
              el.className = "l";
              el.textContent = CHARS[(Math.random() * CHARS.length) | 0];
              const x = c * SP + SP / 2;
              const y = r * SP + SP / 2;
              el.style.left = x + "px";
              el.style.top = y + "px";
              frag.appendChild(el);
              cells.push({
                el: el,
                x: x,
                y: y,
                w: rand(0.4, 1),
                phase: rand(0, Math.PI * 2),
                freq: rand(0.9, 1.7), // per-cell tremble speed (uneasy, out of sync)
                g: 0,
                shaking: false, // is a jitter transform currently applied
              });
            }
          }
          field.appendChild(frag);
        }

        function move(e) {
          const p = e.touches ? e.touches[0] : e;
          mx = p.clientX;
          my = p.clientY;
          active = true;
          lastActive = performance.now();
        }
        function leave() {
          // let autopilot resume shortly after the pointer leaves
          active = false;
          lastActive = performance.now() - IDLE;
        }

        function frame(t) {
          if (firstFrame) {
            firstFrame = false;
            lastActive = t; // begin the idle countdown now
          }
          if (!reduce) flow(t);

          // ease spread toward the scroll target
          spread += (spreadTarget - spread) * 0.15;
          const rad = 100 + 210 * spread; // 100 (narrow) .. 310 (wide), mid ~205
          const inten = 1.7 - 1.5 * spread; // 1.7 (bright) .. 0.2 (faint), mid ~0.95
          const R2 = rad * rad;

          // --- beam target: real pointer, or a wandering autopilot when idle ---
          const W = innerWidth,
            H = innerHeight;
          const idle = t - lastActive > IDLE;
          const show = idle || active;
          let tx, ty;
          if (idle) {
            tx = W * 0.5 + W * 0.36 * Math.sin(t * 0.00022) * Math.cos(t * 0.00007);
            ty = H * 0.5 + H * 0.34 * Math.sin(t * 0.00031 + 1.2);
          } else {
            tx = mx;
            ty = my;
          }
          if (show && !prevShow) {
            bx = tx;
            by = ty;
          } // snap on first appearance, no sweep-in
          prevShow = show;
          if (show) {
            const k = idle ? 0.03 : 0.18; // slow dreamy glide vs snappy follow
            bx += (tx - bx) * k;
            by += (ty - by) * k;
          } else {
            bx = -9999;
            by = -9999;
          }
          beam.style.opacity = show ? "1" : "0";

          // --- light the grid, leaving a fading trail behind the beam ---
          for (let i = 0; i < cells.length; i++) {
            const cell = cells[i];
            const dx = cell.x - bx,
              dy = cell.y - by;
            const d2 = dx * dx + dy * dy;
            let target = 0;
            if (d2 < R2) {
              let base = 1 - Math.sqrt(d2) / rad; // 0..1
              base = base * base; // ease
              const flick = reduce
                ? 1
                : 0.55 + 0.45 * Math.sin(t * 0.006 + cell.phase);
              target = base * cell.w * flick * inten;
              if (target > 1) target = 1;
            }
            cell.g *= DECAY; // previous glow fades -> trail
            if (target > cell.g) cell.g = target; // beam re-lights instantly
            const g = cell.g;
            cell.el.style.opacity = g.toFixed(3);

            // --- "scary numbers": cells under the beam tremble & pulse ---
            if (reduce) continue;
            if (g > 0.05) {
              const amp = 2.6 * g; // stronger tremble the brighter it burns
              const f = cell.freq;
              // high-frequency wobble + a jittery random flutter each frame
              const jx =
                Math.sin(t * 0.017 * f + cell.phase) * amp +
                (Math.random() - 0.5) * amp;
              const jy =
                Math.cos(t * 0.019 * f + cell.phase * 1.3) * amp +
                (Math.random() - 0.5) * amp;
              const s = 1 + 0.14 * g * Math.sin(t * 0.011 * f + cell.phase); // breathing pulse
              cell.el.style.transform =
                "translate(-50%,-50%) translate(" +
                jx.toFixed(2) +
                "px," +
                jy.toFixed(2) +
                "px) scale(" +
                s.toFixed(3) +
                ")";
              cell.shaking = true;
              // occasionally a bright cell flips its digit — restless, alive
              if (g > 0.55 && Math.random() < 0.02) {
                cell.el.textContent = CHARS[(Math.random() * CHARS.length) | 0];
              }
            } else if (cell.shaking) {
              // settled back into the dark: drop the jitter transform once
              cell.el.style.transform = "translate(-50%,-50%)";
              cell.shaking = false;
            }
          }

          // beam halo follows the (eased) beam, scales with width, fades with intensity
          beam.style.transform =
            "translate(" +
            bx +
            "px," +
            by +
            "px) scale(" +
            (rad / 205).toFixed(3) +
            ")";
          beam.style.background =
            "radial-gradient(circle, " +
            rgba(curFg, (0.16 * inten).toFixed(3)) +
            " 0%, " +
            rgba(curFg, (0.08 * inten).toFixed(3)) +
            " 38%, transparent 72%)";

          requestAnimationFrame(frame);
        }

        // ---- palettes: continuous crossfade between them ----
        const PAIRS = [
          ["#121212", "#FFFFFF"],
          ["#121212", "#FF5722"],
          ["#121212", "#A8DADC"],
          ["#121212", "#B39CD0"],
          ["#121212", "#F1C1CC"],
          ["#121212", "#A63A6E"],
          ["#121212", "#8259D6"],
          ["#121212", "#1E90FF"],
          ["#121212", "#00FF85"],
          ["#121212", "#FFEB3B"],
        ];
        const body = document.body;
        function hex(h) {
          return [
            parseInt(h.slice(1, 3), 16),
            parseInt(h.slice(3, 5), 16),
            parseInt(h.slice(5, 7), 16),
          ];
        }
        const RGB = PAIRS.map(function (p) {
          return { bg: hex(p[0]), fg: hex(p[1]) };
        });
        let curFg = RGB[0].fg; // current interpolated text colour, used by the beam
        const SEG = 5600; // ms for one palette to flow into the next
        function mix(a, b, e) {
          return [
            Math.round(a[0] + (b[0] - a[0]) * e),
            Math.round(a[1] + (b[1] - a[1]) * e),
            Math.round(a[2] + (b[2] - a[2]) * e),
          ];
        }
        function rgb(c) {
          return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
        }
        function rgba(c, a) {
          return "rgba(" + c[0] + "," + c[1] + "," + c[2] + "," + a + ")";
        }
        function applyColors(bg, fg) {
          body.style.background = rgb(bg);
          body.style.setProperty("--fg", rgb(fg));
          curFg = fg;
        }
        function flow(t) {
          const N = RGB.length,
            g = t / SEG;
          const idx = Math.floor(g) % N;
          let e = g - Math.floor(g);
          e = e * e * (3 - 2 * e); // smoothstep for a gentle ease
          const a = RGB[idx],
            b = RGB[(idx + 1) % N];
          applyColors(mix(a.bg, b.bg, e), mix(a.fg, b.fg, e));
        }
        applyColors(RGB[0].bg, RGB[0].fg); // initial (and the static palette when motion is reduced)

        // ---- looping headline: "hello" around the world ----
        (function () {
          // greetings in many languages of the world
          const HELLOS = [
            "Привет", // Russian
            "Hello", // English
            "Hola", // Spanish
            "Bonjour", // French
            "Hallo", // German
            "Ciao", // Italian
            "Olá", // Portuguese
            "こんにちは", // Japanese
            "你好", // Chinese
            "안녕하세요", // Korean
            "مرحبا", // Arabic
            "שלום", // Hebrew
            "नमस्ते", // Hindi
            "Γειά σου", // Greek
            "Merhaba", // Turkish
            "Cześć", // Polish
            "Ahoj", // Czech
            "Hej", // Swedish
            "Hei", // Finnish
            "Salut", // Romanian
            "Sveiki", // Latvian
            "Labas", // Lithuanian
            "Zdravo", // Serbian/Croatian
            "Здравейте", // Bulgarian
            "Привіт", // Ukrainian
            "Сәлем", // Kazakh
            "Xin chào", // Vietnamese
            "สวัสดี", // Thai
            "Halo", // Indonesian
            "Kamusta", // Filipino
            "Jambo", // Swahili
            "Sawubona", // Zulu
            "Namaste", // Nepali
            "Sannu", // Hausa
            "Aloha", // Hawaiian
          ];
          const el = document.getElementById("txt");
          let text = VISITOR.greeting; // first pass: greeting in the visitor's language
          function next() {
            let t;
            do {
              t = HELLOS[(Math.random() * HELLOS.length) | 0];
            } while (t === text);
            text = t;
          }

          if (reduce) {
            el.textContent = text;
            return;
          }

          const TYPE = 95,
            ERASE = 42,
            HOLD = 2200,
            GAP = 480;
          function type(i) {
            el.textContent = text.slice(0, i);
            if (i < text.length)
              setTimeout(function () {
                type(i + 1);
              }, TYPE);
            else
              setTimeout(function () {
                erase(text.length);
              }, HOLD);
          }
          function erase(i) {
            el.textContent = text.slice(0, i);
            if (i > 0)
              setTimeout(function () {
                erase(i - 1);
              }, ERASE);
            else {
              next();
              setTimeout(function () {
                type(0);
              }, GAP);
            } // new random order each time
          }
          type(0);
        })();

        let rz;
        addEventListener("resize", function () {
          clearTimeout(rz);
          rz = setTimeout(build, 150);
        });
        addEventListener("pointermove", move, { passive: true });
        addEventListener("pointerdown", move, { passive: true });
        addEventListener("pointerleave", leave);
        addEventListener("touchmove", move, { passive: true });

        // scroll: down -> wider & fainter, up -> narrower & brighter
        addEventListener(
          "wheel",
          function (e) {
            e.preventDefault();
            spreadTarget = clamp01(spreadTarget + e.deltaY * 0.0009);
          },
          { passive: false },
        );

        // ---- boot terminal: fake power-on log, then fade to the scene ----
        (function () {
          const boot = document.getElementById("boot");
          const log = document.getElementById("bootlog");
          if (!boot || !log) return;
          // pad a label to a fixed width with dots, then append the value
          function row(label, value) {
            const dots = ".".repeat(Math.max(3, 33 - label.length));
            return label + " " + dots + " " + value;
          }
          const lines = [
            "RETICULUM TERMINAL  v3.7.1",
            "(c) macrodata refinement division",
            "",
            row("detecting locale", VISITOR.locale),
            row("resolving timezone", VISITOR.tz || "unknown"),
            row("local time", VISITOR.time || "--:--"),
            row("initializing display", "OK"),
            row("loading character matrix", "OK"),
            row("calibrating flashlight", "OK"),
            row("mounting /dev/greetings", "OK"),
            row("spawning numbers", "OK"),
            "",
            "greeting visitor > " + VISITOR.greeting,
            "",
            "READY.",
          ];
          function finish() {
            boot.classList.add("done");
            setTimeout(function () {
              boot.remove();
            }, 600);
          }
          if (reduce) {
            log.textContent = lines.join("\n");
            setTimeout(finish, 700);
            return;
          }
          let i = 0;
          (function step() {
            if (i < lines.length) {
              log.textContent += (i ? "\n" : "") + lines[i];
              const line = lines[i];
              i++;
              // blank lines flick by; dotted "loading" rows land with a beat of latency
              const delay =
                line === "" ? 55 : /\.{3,}/.test(line) ? rand(130, 250) : rand(90, 160);
              setTimeout(step, delay);
            } else {
              setTimeout(finish, 550);
            }
          })();
        })();

        // ---- glitch bursts: fire at random intervals, sometimes in pairs ----
        (function () {
          if (reduce) return;
          const b = document.body;
          function burst() {
            b.classList.remove("glitching");
            void b.offsetWidth; // reflow so the animation can retrigger
            b.classList.add("glitching");
            setTimeout(function () {
              b.classList.remove("glitching");
            }, 210);
            // occasional stutter: a quick second flash right after
            if (Math.random() < 0.35) {
              setTimeout(burst, rand(240, 420));
            }
          }
          function loop() {
            setTimeout(function () {
              burst();
              loop();
            }, rand(2600, 7200));
          }
          loop();
        })();

        build();
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
