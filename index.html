<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>тут ничего нет</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: #0a0a0a;
        color: var(--fg);
        --fg: #f8f7f4;
        min-height: 100dvh;
        overflow: hidden;
        font-family:
          ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono",
          "Courier New", monospace;
      }

      /* field of faint random letters revealed by the "flashlight" */
      #field {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }
      #field .l {
        position: absolute;
        transform: translate(-50%, -50%);
        font-size: 15px;
        line-height: 1;
        color: var(--fg);
        opacity: 0;
        will-change: opacity;
      }

      /* soft flashlight halo following the cursor */
      #beam {
        position: fixed;
        z-index: 2;
        width: 410px;
        height: 410px;
        left: 0;
        top: 0;
        margin: -205px 0 0 -205px;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(255, 255, 255, 0.02) 35%,
          transparent 70%
        );
      }

      /* the actual message, always readable, on top */
      .line {
        position: fixed;
        inset: 0;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .type {
        font-size: clamp(1.1rem, 4.5vw, 1.9rem);
        line-height: 1;
        letter-spacing: 0.02em;
        white-space: pre;
        color: var(--fg);
      }
      .caret {
        display: inline-block;
        width: 0.5ch;
        height: 1em;
        margin-left: 0.12em;
        vertical-align: -0.12em;
        background: var(--fg);
        animation: blink 1s steps(1) infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .caret {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="field" aria-hidden="true"></div>
    <div id="beam"></div>
    <div class="line">
      <span class="type"
        ><span id="txt"></span><span class="caret" aria-hidden="true"></span
      ></span>
    </div>

    <script>
      (function () {
        "use strict";
        const field = document.getElementById("field");
        const beam = document.getElementById("beam");
        const CHARS = "0123456789";
        const SP = 26; // grid spacing
        const DIM = 0; // fully hidden outside the beam
        const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

        // scroll trades beam width vs brightness: 0 = narrow+bright, 1 = wide+faint, .5 = default
        let spread = 0.5,
          spreadTarget = 0.5;
        function clamp01(v) {
          return v < 0 ? 0 : v > 1 ? 1 : v;
        }

        let cells = []; // {el,x,y,w,phase}
        let px = -9999,
          py = -9999; // pointer position (offscreen at start)

        function rand(a, b) {
          return a + Math.random() * (b - a);
        }

        function build() {
          field.innerHTML = "";
          cells = [];
          const W = innerWidth,
            H = innerHeight;
          const cols = Math.ceil(W / SP) + 1,
            rows = Math.ceil(H / SP) + 1;
          const frag = document.createDocumentFragment();
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const el = document.createElement("span");
              el.className = "l";
              el.textContent = CHARS[(Math.random() * CHARS.length) | 0];
              const x = c * SP + SP / 2;
              const y = r * SP + SP / 2;
              el.style.left = x + "px";
              el.style.top = y + "px";
              frag.appendChild(el);
              cells.push({
                el: el,
                x: x,
                y: y,
                w: rand(0.4, 1),
                phase: rand(0, Math.PI * 2),
              });
            }
          }
          field.appendChild(frag);
        }

        function move(e) {
          const p = e.touches ? e.touches[0] : e;
          px = p.clientX;
          py = p.clientY;
          beam.style.opacity = "1";
        }
        function leave() {
          px = py = -9999;
          beam.style.opacity = "0";
        }

        function frame(t) {
          if (!reduce) flow(t);

          // ease spread toward the scroll target
          spread += (spreadTarget - spread) * 0.15;
          const rad = 100 + 210 * spread; // 100 (narrow) .. 310 (wide), mid ~205
          const inten = 1.7 - 1.5 * spread; // 1.7 (bright) .. 0.2 (faint), mid ~0.95
          const R2 = rad * rad;

          for (let i = 0; i < cells.length; i++) {
            const cell = cells[i];
            const dx = cell.x - px,
              dy = cell.y - py;
            const d2 = dx * dx + dy * dy;
            let op = DIM;
            if (d2 < R2) {
              let base = 1 - Math.sqrt(d2) / rad; // 0..1
              base = base * base; // ease
              const flick = reduce
                ? 1
                : 0.55 + 0.45 * Math.sin(t * 0.006 + cell.phase);
              op = base * cell.w * flick * inten;
              if (op > 1) op = 1;
            }
            cell.el.style.opacity = op.toFixed(3);
          }

          // beam halo follows cursor, scales with width, fades with intensity
          beam.style.transform =
            "translate(" +
            px +
            "px," +
            py +
            "px) scale(" +
            (rad / 205).toFixed(3) +
            ")";
          beam.style.background =
            "radial-gradient(circle, " +
            rgba(curFg, (0.16 * inten).toFixed(3)) +
            " 0%, " +
            rgba(curFg, (0.08 * inten).toFixed(3)) +
            " 38%, transparent 72%)";

          requestAnimationFrame(frame);
        }

        // ---- palettes: continuous crossfade between them ----
        const PAIRS = [
          ["#121212", "#FFFFFF"],
          ["#121212", "#FF5722"],
          ["#121212", "#A8DADC"],
          ["#121212", "#B39CD0"],
          ["#121212", "#F1C1CC"],
          ["#121212", "#822659"],
          ["#121212", "#673AB7"],
          ["#121212", "#1E90FF"],
          ["#121212", "#00FF85"],
          ["#121212", "#FFEB3B"],
        ];
        const body = document.body;
        function hex(h) {
          return [
            parseInt(h.slice(1, 3), 16),
            parseInt(h.slice(3, 5), 16),
            parseInt(h.slice(5, 7), 16),
          ];
        }
        const RGB = PAIRS.map(function (p) {
          return { bg: hex(p[0]), fg: hex(p[1]) };
        });
        let curFg = RGB[0].fg; // current interpolated text colour, used by the beam
        const SEG = 5600; // ms for one palette to flow into the next
        function mix(a, b, e) {
          return [
            Math.round(a[0] + (b[0] - a[0]) * e),
            Math.round(a[1] + (b[1] - a[1]) * e),
            Math.round(a[2] + (b[2] - a[2]) * e),
          ];
        }
        function rgb(c) {
          return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
        }
        function rgba(c, a) {
          return "rgba(" + c[0] + "," + c[1] + "," + c[2] + "," + a + ")";
        }
        function applyColors(bg, fg) {
          body.style.background = rgb(bg);
          body.style.setProperty("--fg", rgb(fg));
          curFg = fg;
        }
        function flow(t) {
          const N = RGB.length,
            g = t / SEG;
          const idx = Math.floor(g) % N;
          let e = g - Math.floor(g);
          e = e * e * (3 - 2 * e); // smoothstep for a gentle ease
          const a = RGB[idx],
            b = RGB[(idx + 1) % N];
          applyColors(mix(a.bg, b.bg, e), mix(a.fg, b.fg, e));
        }
        applyColors(RGB[0].bg, RGB[0].fg); // initial (and the static palette when motion is reduced)

        // ---- looping headline: type, hold, erase, retype ----
        (function () {
          const WORDS = ["тут", "ничего", "нет"];
          const el = document.getElementById("txt");
          let text = "тут ничего нет"; // first pass: the real phrase
          function shuffled() {
            const a = WORDS.slice();
            for (let i = a.length - 1; i > 0; i--) {
              const j = (Math.random() * (i + 1)) | 0;
              const t = a[i];
              a[i] = a[j];
              a[j] = t;
            }
            return a.join(" ");
          }
          function next() {
            let t;
            do {
              t = shuffled();
            } while (t === text);
            text = t;
          }

          if (reduce) {
            el.textContent = text;
            return;
          }

          const TYPE = 95,
            ERASE = 42,
            HOLD = 2200,
            GAP = 480;
          function type(i) {
            el.textContent = text.slice(0, i);
            if (i < text.length)
              setTimeout(function () {
                type(i + 1);
              }, TYPE);
            else
              setTimeout(function () {
                erase(text.length);
              }, HOLD);
          }
          function erase(i) {
            el.textContent = text.slice(0, i);
            if (i > 0)
              setTimeout(function () {
                erase(i - 1);
              }, ERASE);
            else {
              next();
              setTimeout(function () {
                type(0);
              }, GAP);
            } // new random order each time
          }
          type(0);
        })();

        let rz;
        addEventListener("resize", function () {
          clearTimeout(rz);
          rz = setTimeout(build, 150);
        });
        addEventListener("pointermove", move, { passive: true });
        addEventListener("pointerdown", move, { passive: true });
        addEventListener("pointerleave", leave);
        addEventListener("touchmove", move, { passive: true });

        // scroll: down -> wider & fainter, up -> narrower & brighter
        addEventListener(
          "wheel",
          function (e) {
            e.preventDefault();
            spreadTarget = clamp01(spreadTarget + e.deltaY * 0.0009);
          },
          { passive: false },
        );

        build();
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
