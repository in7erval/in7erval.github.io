<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>тут ничего нет</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      background:#0A0A0A;
      color:var(--fg);
      --fg:#F8F7F4;
      min-height:100dvh;
      overflow:hidden;
      font-family:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono","Courier New",monospace;
    }

    /* field of faint random letters revealed by the "flashlight" */
    #field{
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
    }
    #field .l{
      position:absolute;
      transform:translate(-50%,-50%);
      font-size:15px;
      line-height:1;
      color:var(--fg);
      opacity:0;
      will-change:opacity;
    }

    /* soft flashlight halo following the cursor */
    #beam{
      position:fixed;
      z-index:2;
      width:470px;height:470px;
      left:0;top:0;
      margin:-235px 0 0 -235px;
      border-radius:50%;
      pointer-events:none;
      opacity:0;
      transition:opacity .25s ease;
      background:radial-gradient(circle,
        rgba(255,255,255,.05) 0%,
        rgba(255,255,255,.02) 35%,
        transparent 70%);
    }

    /* the actual message, always readable, on top */
    .line{
      position:fixed;
      inset:0;
      z-index:3;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }
    .type{
      font-size:clamp(1.1rem,4.5vw,1.9rem);
      line-height:1;
      letter-spacing:.02em;
      white-space:pre;
      color:var(--fg);
    }
    .caret{
      display:inline-block;
      width:.5ch;height:1em;
      margin-left:.12em;
      vertical-align:-0.12em;
      background:var(--fg);
      animation:blink 1s steps(1) infinite;
    }
    @keyframes blink{50%{opacity:0}}
    @media (prefers-reduced-motion:reduce){.caret{animation:none}}
  </style>
</head>
<body>
  <div id="field" aria-hidden="true"></div>
  <div id="beam"></div>
  <div class="line"><span class="type"><span id="txt"></span><span class="caret" aria-hidden="true"></span></span></div>

  <script>
  (function(){
    "use strict";
    const field = document.getElementById("field");
    const beam  = document.getElementById("beam");
    const CHARS = "0123456789";
    const R = 205;                 // flashlight radius
    const SP = 26;                 // grid spacing
    const DIM = 0;                 // fully hidden outside the beam
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

    let cells = [];                // {el,x,y,w,phase}
    let px = -9999, py = -9999;    // pointer position (offscreen at start)

    function rand(a,b){ return a + Math.random()*(b-a); }

    function build(){
      field.innerHTML = "";
      cells = [];
      const W = innerWidth, H = innerHeight;
      const cols = Math.ceil(W/SP)+1, rows = Math.ceil(H/SP)+1;
      const frag = document.createDocumentFragment();
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          const el = document.createElement("span");
          el.className = "l";
          el.textContent = CHARS[(Math.random()*CHARS.length)|0];
          const x = c*SP + SP/2;
          const y = r*SP + SP/2;
          el.style.left = x+"px";
          el.style.top  = y+"px";
          frag.appendChild(el);
          cells.push({el:el, x:x, y:y, w:rand(.4,1), phase:rand(0,Math.PI*2)});
        }
      }
      field.appendChild(frag);
    }

    function move(e){
      const p = e.touches ? e.touches[0] : e;
      px = p.clientX; py = p.clientY;
      beam.style.transform = "translate("+px+"px,"+py+"px)";
      beam.style.opacity = "1";
    }
    function leave(){ px = py = -9999; beam.style.opacity = "0"; }

    function frame(t){
      if(!reduce) flow(t);
      const R2 = R*R;
      for(let i=0;i<cells.length;i++){
        const cell = cells[i];
        const dx = cell.x - px, dy = cell.y - py;
        const d2 = dx*dx + dy*dy;
        let op = DIM;
        if(d2 < R2){
          let base = 1 - Math.sqrt(d2)/R;   // 0..1
          base = base*base;                 // ease
          const flick = reduce ? 1 : (0.55 + 0.45*Math.sin(t*0.006 + cell.phase));
          op = DIM + (1-DIM)*base*cell.w*flick;
        }
        cell.el.style.opacity = op.toFixed(3);
      }
      requestAnimationFrame(frame);
    }

    // ---- palettes: continuous crossfade between them ----
    const PAIRS = [
      ["#0A0A0A","#F8F7F4"],
      ["#22282A","#CFD4C7"],
      ["#064E3B","#F8E7C9"],
      ["#2A2320","#D8C6AE"],
      ["#231E2B","#CDB9C6"]
    ];
    const body = document.body;
    function hex(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
    const RGB = PAIRS.map(function(p){ return {bg:hex(p[0]), fg:hex(p[1])}; });
    const SEG = 5600;   // ms for one palette to flow into the next
    function mix(a,b,e){ return [Math.round(a[0]+(b[0]-a[0])*e),Math.round(a[1]+(b[1]-a[1])*e),Math.round(a[2]+(b[2]-a[2])*e)]; }
    function rgb(c){ return "rgb("+c[0]+","+c[1]+","+c[2]+")"; }
    function rgba(c,a){ return "rgba("+c[0]+","+c[1]+","+c[2]+","+a+")"; }
    function applyColors(bg,fg){
      body.style.background = rgb(bg);
      body.style.setProperty("--fg", rgb(fg));
      beam.style.background = "radial-gradient(circle, "+rgba(fg,.15)+" 0%, "+rgba(fg,.07)+" 38%, transparent 72%)";
    }
    function flow(t){
      const N = RGB.length, g = t/SEG;
      const idx = Math.floor(g) % N;
      let e = g - Math.floor(g);
      e = e*e*(3-2*e);                 // smoothstep for a gentle ease
      const a = RGB[idx], b = RGB[(idx+1)%N];
      applyColors(mix(a.bg,b.bg,e), mix(a.fg,b.fg,e));
    }
    applyColors(RGB[0].bg, RGB[0].fg);  // initial (and the static palette when motion is reduced)

    // ---- looping headline: type, hold, erase, retype ----
    (function(){
      const WORDS = ["тут","ничего","нет"];
      const el = document.getElementById("txt");
      let text = "тут ничего нет";               // first pass: the real phrase
      function shuffled(){
        const a = WORDS.slice();
        for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=a[i]; a[i]=a[j]; a[j]=t; }
        return a.join(" ");
      }
      function next(){ let t; do{ t = shuffled(); } while(t === text); text = t; }

      if(reduce){ el.textContent = text; return; }

      const TYPE = 95, ERASE = 42, HOLD = 2200, GAP = 480;
      function type(i){
        el.textContent = text.slice(0, i);
        if(i < text.length) setTimeout(function(){ type(i+1); }, TYPE);
        else setTimeout(function(){ erase(text.length); }, HOLD);
      }
      function erase(i){
        el.textContent = text.slice(0, i);
        if(i > 0) setTimeout(function(){ erase(i-1); }, ERASE);
        else { next(); setTimeout(function(){ type(0); }, GAP); }   // new random order each time
      }
      type(0);
    })();

    let rz;
    addEventListener("resize", function(){ clearTimeout(rz); rz = setTimeout(build, 150); });
    addEventListener("pointermove", move, {passive:true});
    addEventListener("pointerdown", move, {passive:true});
    addEventListener("pointerleave", leave);
    addEventListener("touchmove", move, {passive:true});

    build();
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
